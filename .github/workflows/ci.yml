name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.26'
  # Pinned to match the local toolchain (golangci-lint 2.12.2) so the git
  # hooks, `task lint`, and CI all run the identical linter version.
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  # The differential and PSNR gates are only meaningful against FFmpeg built
  # from this exact commit. A distro ffmpeg predates the NMR coder this port
  # targets and is not a valid oracle. Keep in sync with PROVENANCE.md.
  FFMPEG_COMMIT: 'd09d5afc3aebede25d2d245ee23b75a47ea17c3a'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

      # The goaac_simd build swaps in the f32.MinIdxOfSumRows trellis kernel and
      # the f32.AbsPow34 magnitude kernel. Their output is byte-identical, but
      # they link assembly and must be tested on every arch this matrix covers or
      # they can rot unnoticed.
      - name: Run tests (goaac_simd)
        run: go test -race -tags goaac_simd ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lint the default build and the goaac_simd build; the tagged file is
        # only compiled (and so only linted) with the tag set.
        tags: ['', 'goaac_simd']
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: ${{ matrix.tags != '' && format('--build-tags {0}', matrix.tags) || '' }}

  vet:
    name: Vet
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run go vet
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

      - name: Run go vet (goaac_simd)
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go vet -tags goaac_simd ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

      - name: Build (goaac_simd)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -tags goaac_simd ./...

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      # A short bounded run of each decode-path fuzz target on every build.
      # Any crash a run finds is committed under testdata/fuzz as a regression
      # seed, so the corpus grows monotonically. These are smoke runs, not a
      # substitute for a long local fuzz session.
      - name: Fuzz ADTS parser
        run: go test -run='^$' -fuzz=FuzzParseADTS -fuzztime=20s ./internal/dec/
      - name: Fuzz ASC parser
        run: go test -run='^$' -fuzz=FuzzParseASC -fuzztime=15s ./internal/dec/
      - name: Fuzz frame decode
        run: go test -run='^$' -fuzz=FuzzDecodeFrame -fuzztime=20s ./internal/dec/
      - name: Fuzz public stream decode
        run: go test -run='^$' -fuzz=FuzzDecodeStream -fuzztime=20s ./pcm/

      # The goaac_simd trellis kernel against the naive C-transcription
      # reference: random shapes the fixed grid only samples, asserting
      # bit-identical output and never-panic.
      - name: Fuzz SIMD trellis differential
        run: go test -run='^$' -fuzz=FuzzNMRTrellisStep -fuzztime=20s -tags goaac_simd ./internal/coder/
      # The goaac_simd AbsPow34 kernel against the scalar reference it must match.
      - name: Fuzz SIMD AbsPow34 differential
        run: go test -run='^$' -fuzz=FuzzAbsPow34Equiv -fuzztime=20s -tags goaac_simd ./internal/dsp/

  # The differential/PSNR gates are the only check that can tell a correct
  # encoder from a plausible-but-wrong one; PSNR alone cannot see a misported
  # psy constant or a drifting bit reservoir. Without this job they skip on CI
  # and still print ok, so a broken encoder can be fully green (it happened: a
  # bad rate-control guard failed every 128k encode past 15 green checks).
  oracle:
    name: Differential oracle gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # This job builds FFmpeg from source, so external build scripts run
          # in this workspace. Do not leave a credential in the git config
          # while they execute.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Restore pinned FFmpeg
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: ~/ffmpeg-oracle
          # Keyed on the pin, so the build happens once and any change to
          # FFMPEG_COMMIT builds a fresh oracle instead of reusing a stale one.
          key: ffmpeg-oracle-${{ runner.os }}-${{ env.FFMPEG_COMMIT }}

      - name: Build pinned FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y nasm
          git init ffmpeg-src
          cd ffmpeg-src
          git remote add origin https://github.com/FFmpeg/FFmpeg.git
          git fetch --depth 1 origin "$FFMPEG_COMMIT"
          git checkout FETCH_HEAD
          # Refuse to build anything other than the pin.
          test "$(git rev-parse HEAD)" = "$FFMPEG_COMMIT"
          # Same flags as the validated local oracle. --disable-programs
          # --enable-ffmpeg only skips building ffprobe/ffplay, which the gates
          # never invoke; it does not change libav* behaviour.
          ./configure --disable-doc --disable-network --disable-autodetect \
                      --disable-programs --enable-ffmpeg
          make -j"$(nproc)"
          mkdir -p ~/ffmpeg-oracle
          cp ffmpeg ~/ffmpeg-oracle/ffmpeg

      - name: Verify the oracle provides what the gates need
        # Each consumer drains its stream. Under pipefail an early-closing
        # consumer (head -1, grep -q) can kill ffmpeg with SIGPIPE and fail the
        # step even though the oracle is fine, so use sed -n '1p' and a plain
        # grep redirected to /dev/null instead.
        run: |
          set -euo pipefail
          ~/ffmpeg-oracle/ffmpeg -hide_banner -version | sed -n '1p'
          ~/ffmpeg-oracle/ffmpeg -hide_banner -decoders | grep -w aac_fixed >/dev/null
          ~/ffmpeg-oracle/ffmpeg -hide_banner -encoders | grep -w aac >/dev/null

      - name: Run the differential and PSNR gates
        # GOAAC_REQUIRE_ORACLE turns a missing oracle into a failure instead of
        # a skip. Without it this job could silently degrade to the very bug it
        # closes. -count=1 because setup-go restores the Go test cache, and a
        # cached ok would otherwise satisfy the gate without running it. The
        # goaac_simd run gates the SIMD trellis and AbsPow34 kernels
        # byte-identical against the same oracle (not merely transitively
        # through the scalar), on the AVX2 path this runner provides, so the
        # tagged build cannot drift.
        run: |
          GOAAC_FFMPEG="$HOME/ffmpeg-oracle/ffmpeg" \
          GOAAC_REQUIRE_ORACLE=1 \
            go test -count=1 ./...
          GOAAC_FFMPEG="$HOME/ffmpeg-oracle/ffmpeg" \
          GOAAC_REQUIRE_ORACLE=1 \
            go test -count=1 -tags goaac_simd ./...
